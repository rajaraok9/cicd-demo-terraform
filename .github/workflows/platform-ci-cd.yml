name: platform-ci-cd.yml
on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: healthcare-cluster
  ECR_REPOSITORY_PATIENT: patient-intake-service
  ECR_REPOSITORY_WORKFLOW: workflow-worker

jobs:

  deploy-platform:

    runs-on: ubuntu-latest

    steps:

      # Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Terraform Init
      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      # Terraform Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Build Spring Boot Project
      - name: Build Maven Project
        run: mvn clean install -DskipTests

      # Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Patient Service Docker Image
      - name: Build Patient Intake Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PATIENT }}:latest ./patient-intake-service
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PATIENT }}:latest

      # Build Workflow Worker Image
      - name: Build Workflow Worker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WORKFLOW }}:latest ./workflow-worker
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WORKFLOW }}:latest

      # Install kubectl
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      # Configure kubeconfig
      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      # Deploy to Kubernetes
      - name: Deploy Microservices
        run: |
          kubectl apply -f k8s/patient-intake-service.yaml
          kubectl apply -f k8s/patient-intake-deployment.yaml
          kubectl apply -f k8s/workflow-worker-deployment.yaml
          kubectl apply -f k8s/keda-auth.yaml
          kubectl apply -f k8s/keda-scaledobject.yaml